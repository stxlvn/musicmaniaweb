<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MusicmaniA | Telegram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            /* Цвет фона из картинки-референса */
            background-color: #141618; 
            height: 100%;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Текстура зернистого шума как на картинке */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTAwIDEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZmlsdGVyIGlkPSJub2lzZUZpbHRlciI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuOSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNub2lzZUZpbHRlcikiIG9wYWNpdHk9IjAuMDgiLz48L3N2Zz4=');
            background-repeat: repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            text-align: center;
            /* Легкая прозрачность для сохранения стиля карточки */
            background: rgba(255, 255, 255, 0.03); 
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 350px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            /* ПОДСВЕТКА И ОБВОДКА УБРАНЫ */
            box-shadow: none; 
            border: none;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #bdc3c7;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #0088cc;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #00aaff;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #7f8c8d;
        }
        
        #sub-count {
            transition: opacity 0.3s ease;
            font-weight: bold;
            color: #e67e22;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://github.com/stxlvn/musicmaniaweb/blob/main/logo.jpg?raw=true" alt="MusicmaniA Logo" class="logo">
        
        <h1>MusicmaniA</h1>
        <p>Услышал мелодию — и внутри щёлкает: «вот оно!» ✨<br><br>Редкие находки, факты и саундтреки 🎬🎮 от классики до новинок.</p>
        
        <a href="https://t.me/oldmusicmania" class="btn" target="_blank" rel="noopener noreferrer">
            ОТКРЫТЬ В TELEGRAM
        </a>

        <div class="footer">
            Уже более <span id="sub-count">...</span> меломанов с нами
        </div>
    </div>

    <script>
        async function fetchTelegramCount() {
            const countElement = document.getElementById('sub-count');
            const channelUrl = 'https://t.me/oldmusicmania'; 
            
            try {
                const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${channelUrl}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const htmlText = await response.text();
                const match = htmlText.match(/<div class="tgme_page_extra">([^<]+)<\/div>/);
                
                if (match && match[1]) {
                    const count = match[1].replace(/\D/g, '');
                    if (count) {
                        countElement.style.opacity = '0';
                        setTimeout(() => {
                            countElement.textContent = new Intl.NumberFormat('ru-RU').format(count);
                            countElement.style.opacity = '1';
                        }, 300);
                        return; 
                    }
                }
                throw new Error('Count not found');
            } catch (error) {
                console.error('Не удалось загрузить счетчик:', error);
                countElement.textContent = '5 000+';
            }
        }
        document.addEventListener('DOMContentLoaded', fetchTelegramCount);
    </script>

</body>
</html>
