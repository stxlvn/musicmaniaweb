            background-repeat: repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            text-align: center;
            /* Темный, текстурированный фон для самой карточки */
            background: #141618;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTAwIDEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZmlsdGVyIGlkPSJub2lzZUZpbHRlciI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuOSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNub2lzZUZpbHRlcikiIG9wYWNpdHk9IjAuMSIvPjwvc3ZnPg==');
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 350px;
            width: 90%;
            color: #ffffff;
        }

        .placeholder {
            width: 100px;
            height: 100px;
            background: #e67e22; /* Цвет ретро-винила */
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;

        p {
            font-size: 14px;
            color: #bdc3c7;

        }

</head>
<body>

    <div class="card">
        <img src="https://github.com/stxlvn/musicmaniaweb/blob/main/logo.jpg?raw=true" alt="MusicmaniA Logo" class="logo">
        
        <h1>MusicmaniA</h1>
        <p>Услышал мелодию — и внутри щёлкает: «вот оно!» ✨<br><br>Редкие находки, факты и саундтреки 🎬🎮 от классики до новинок.</p>
        
        <a href="https://t.me/oldmusicmania" class="btn" target="_blank" rel="noopener noreferrer">
            ОТКРЫТЬ В TELEGRAM
        </a>

        <div class="footer">
            Уже более <span id="sub-count">...</span> меломанов с нами
        </div>
    </div>

    <script>
    async function fetchTelegramCount() {
        const countElement = document.getElementById('sub-count');
        const channelUrl = 'https://t.me/oldmusicmania'; 
        
        try {
            // Используем другой прокси (codetabs), который лояльнее к file://
            const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${channelUrl}`);
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            // Codetabs возвращает сразу сырой HTML, а не JSON
            const htmlText = await response.text();

            // Ищем кусок кода Telegram с подписчиками
            const match = htmlText.match(/<div class="tgme_page_extra">([^<]+)<\/div>/);
            
            if (match && match[1]) {
                // Вырезаем только цифры из текста (например, из "1 234 subscribers" останется "1234")
                const count = match[1].replace(/\D/g, '');
                
                if (count) {
                    // Анимированно меняем цифру
                    countElement.style.opacity = '0';
                    setTimeout(() => {
                        countElement.textContent = new Intl.NumberFormat('ru-RU').format(count);
                        countElement.style.opacity = '1';
                    }, 300);
                    return; 
                }
            }
            throw new Error('Count not found in HTML');
        } catch (error) {
            console.error('Не удалось загрузить счетчик:', error);
            // Если прокси не ответил, отвалился интернет или забанил Telegram
            countElement.textContent = '5 000+';
        }
    }
    document.addEventListener('DOMContentLoaded', fetchTelegramCount);
</script>

</body>
</html>
